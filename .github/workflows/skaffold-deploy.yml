on:
  workflow_call:
    inputs:
      skaffold_profile:
        required: true
        description: Skaffold profile https://skaffold.dev/docs/environment/profiles/
        type: string

      # Optional
      environment:
        required: false
        description: "GitHub Actions environment"
        type: string
        default: ""
      skaffold_command:
        required: false
        description: "Skaffold command (skaffold --help)"
        type: string
        default: "run"
      skaffold_extra_params:
        required: false
        description: "Any additional skaffold params"
        type: string
        default: "--cache-artifacts=false"
      workdir:
        required: false
        description: Working directory where helm command line will run
        type: string
        default: .
      secrets_map:
        required: false
        description: |
          Newline-separated KEY=VALUE pairs to export as environment variables.
          Use this when you need to rename a secret or pass values from outside the repository secrets.
          Example:
            secrets_map: |
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
              API_KEY=${{ secrets.API_KEY }}
        type: string
        default: ""

jobs:
  skaffold-run:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to ghcri.io
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export secrets map to env
        if: inputs.secrets_map != ''
        env:
          SECRETS_MAP: ${{ inputs.secrets_map }}
        run: |
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            echo "$line" >> "$GITHUB_ENV"
          done <<< "$SECRETS_MAP"

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin      

      - name: Skaffold
        working-directory: "${{ inputs.workdir }}"
        run: "skaffold ${{ inputs.skaffold_command }} -p ${{ inputs.skaffold_profile }} ${{ inputs.skaffold_extra_params }}"
