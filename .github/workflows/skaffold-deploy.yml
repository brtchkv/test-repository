on:
  workflow_call:
    inputs:
      skaffold_profile:
        required: true
        description: Skaffold profile https://skaffold.dev/docs/environment/profiles/
        type: string

      # Optional
      environment:
        required: false
        description: "GitHub Actions environment"
        type: string
        default: ""
      skaffold_command:
        required: false
        description: "Skaffold command (skaffold --help)"
        type: string
        default: "run"
      skaffold_extra_params:
        required: false
        description: "Any additional skaffold params"
        type: string
        default: "--cache-artifacts=false"
      workdir:
        required: false
        description: Working directory where helm command line will run
        type: string
        default: .
      secret_names:
        required: false
        description: |
          Comma-separated list of secret names to export to the build environment.
          Example: "NPM_TOKEN,MAVEN_TOKEN"
          Recommended: use BuildKit secret mount in DockerFile to avoid storing secrets in the image
        type: string
        default: ""

jobs:
  skaffold-run:
    environment: ${{ inputs.environment }}
    runs-on: sre-eqx-kata
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to ghcri.io
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export secrets to env
        uses: actions/github-script@v9
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          SECRET_NAMES: ${{ inputs.secret_names }}
        with:
          script: |
            const secrets = JSON.parse(process.env.ALL_SECRETS);
            const secretNames = process.env.SECRET_NAMES || '';
            const allowedNames = secretNames.split(',').map(s => s.trim()).filter(Boolean);

            if (allowedNames.length === 0) {
              core.info('No secrets specified for export. Skipping.');
              return;
            }

            core.info(`Exporting ${allowedNames.length} secret(s)...`);

            for (const name of allowedNames) {
              if (name === 'GITHUB_TOKEN') {
                core.warning('GITHUB_TOKEN is managed automatically and should not be exported');
                continue;
              }
              if (name === 'VAULT_TOKEN') {
                core.warning('VAULT_TOKEN is an infrastructure secret and should not be exported to builds');
                continue;
              }

              if (secrets[name]) {
                core.exportVariable(name, secrets[name]);
                core.info(`Exported secret: ${name}`);
              } else {
                core.setFailed(`Secret '${name}' not found in repository secrets`);
                return;
              }
            }

      - name: Skaffold
        working-directory: "${{ inputs.workdir }}"
        run: "skaffold ${{ inputs.skaffold_command }} -p ${{ inputs.skaffold_profile }} ${{ inputs.skaffold_extra_params }}"
